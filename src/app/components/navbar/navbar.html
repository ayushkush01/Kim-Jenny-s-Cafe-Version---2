<header class="sticky top-0 z-50 w-full bg-bone/95 backdrop-blur-sm border-b border-chocolate/10">
  <nav class="max-w-container mx-auto px-5 flex h-20 w-full items-center justify-between">
    <a routerLink="/" (click)="closeMobileMenu()" class="brand-logo">
      <span class="block">
        <span class="font-serif font-normal text-chocolate text-2xl">
          Kim <span class="italic">&amp;</span> Jenny's
        </span>
      </span>
      <span class="block text-[9px] tracking-[0.3em] uppercase text-chocolate/60 mt-1">CAFE</span>
    </a>

    <div class="hidden items-center gap-8 md:flex">
      <a
        class="text-sm text-chocolate/70 hover:text-chocolate transition-colors"
        routerLink="/"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="text-chocolate font-medium">
        Home
      </a>
      <a class="text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/menu" routerLinkActive="text-chocolate font-medium">Menu</a>
      <a class="text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/about" routerLinkActive="text-chocolate font-medium">About</a>
      <a class="text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/location" routerLinkActive="text-chocolate font-medium">Location</a>
      <a class="text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/contact" routerLinkActive="text-chocolate font-medium">Contact</a>
    </div>

    <a
      class="hidden md:inline-flex items-center justify-center bg-chocolate text-bone text-sm px-6 py-2.5 hover:bg-chocolate-light transition-colors"
      routerLink="/menu">
      View Menu
    </a>

    <button
      type="button"
      class="inline-flex h-10 w-10 items-center justify-center bg-bone text-chocolate hover:bg-bone/80 transition-colors md:hidden"
      aria-label="Toggle menu"
      aria-controls="mobile-menu"
      [attr.aria-expanded]="isMobileMenuOpen"
      (click)="toggleMobileMenu()">
      <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
      </svg>
      <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </nav>

  <div
    id="mobile-menu"
    class="border-t border-chocolate/10 bg-bone md:hidden overflow-hidden transition-all duration-300 ease-out"
    [class.max-h-0]="!isMobileMenuOpen"
    [class.opacity-0]="!isMobileMenuOpen"
    [class.-translate-y-1]="!isMobileMenuOpen"
    [class.pointer-events-none]="!isMobileMenuOpen"
    [class.max-h-96]="isMobileMenuOpen"
    [class.opacity-100]="isMobileMenuOpen"
    [class.translate-y-0]="isMobileMenuOpen">
    <div class="max-w-container mx-auto px-5 flex flex-col gap-1 py-4">
      <a class="px-3 py-2 text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="text-chocolate font-medium" (click)="closeMobileMenu()">Home</a>
      <a class="px-3 py-2 text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/menu" routerLinkActive="text-chocolate font-medium" (click)="closeMobileMenu()">Menu</a>
      <a class="px-3 py-2 text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/about" routerLinkActive="text-chocolate font-medium" (click)="closeMobileMenu()">About</a>
      <a class="px-3 py-2 text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/location" routerLinkActive="text-chocolate font-medium" (click)="closeMobileMenu()">Location</a>
      <a class="px-3 py-2 text-sm text-chocolate/70 hover:text-chocolate transition-colors" routerLink="/contact" routerLinkActive="text-chocolate font-medium" (click)="closeMobileMenu()">Contact</a>

      <a
        class="mt-2 inline-flex items-center justify-center bg-chocolate text-bone text-sm px-6 py-2.5 hover:bg-chocolate-light transition-colors"
        routerLink="/menu"
        (click)="closeMobileMenu()">
        View Menu
      </a>
    </div>
  </div>
</header>
